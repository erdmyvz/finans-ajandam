<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <!-- iOS Native App Etiketleri (Safari Çubuğunu Gizler) -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Ajandam">
    <title>Finans Ajandam</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
</head>
<body>

    <!-- ÜST BAR -->
    <header class="app-header">
        <button id="back-btn" class="hidden" onclick="goHome()">◀ Ana Menü</button>
        <h2 id="page-title">Finans Ajandam</h2>
    </header>

    <main class="app-content">

        <!-- ANA MENÜ EKRANI -->
        <div id="screen-home" class="screen">
            <div class="menu-grid">
                <button class="menu-card" onclick="openScreen('screen-expense', 'Harcama Ekle')">
                    <span class="icon">💸</span>
                    <h3>Harcama Ekle</h3>
                    <p>Günlük Giderler</p>
                </button>
                <button class="menu-card" onclick="openScreen('screen-salary', 'Maaş Yönetimi')">
                    <span class="icon">💰</span>
                    <h3>Maaş</h3>
                    <p>Tahmini & Gerçek</p>
                </button>
                <button class="menu-card" onclick="openScreen('screen-status', 'Genel Durum')">
                    <span class="icon">🏦</span>
                    <h3>Genel Durum</h3>
                    <p>Hesaplar & Banka</p>
                </button>
                <button class="menu-card" onclick="openScreen('screen-investment', 'Yatırım & Birikim')">
                    <span class="icon">📈</span>
                    <h3>Yatırım - Birikim</h3>
                    <p>Altın, Fon, Döviz</p>
                </button>
            </div>
        </div>

        <!-- 1. HARCAMA EKLE EKRANI -->
        <div id="screen-expense" class="screen hidden">
            <div class="card form-card">
                <select id="exp-month-select" class="input-field"></select>
                <input type="number" id="exp-amount" class="input-field" placeholder="Tutar (TL)" inputmode="decimal">
                <select id="exp-category" class="input-field">
                    <option value="Yemek/Market">Yemek / Market</option>
                    <option value="Ulaşım">Ulaşım</option>
                    <option value="Abonelik/Fatura">Abonelik / Fatura</option>
                    <option value="Keyfi">Keyfi Harcama</option>
                    <option value="Diğer">Diğer</option>
                </select>
                <input type="text" id="exp-desc" class="input-field" placeholder="Açıklama (İsteğe bağlı)">
                <button class="btn-primary" onclick="addExpense()">Harcama Ekle</button>
            </div>
            <div class="card">
                <h3 class="card-title">Seçili Ayın Harcamaları (<span id="monthly-total-expense">0</span> TL)</h3>
                <ul id="expense-list" class="list-group"></ul>
            </div>
        </div>

        <!-- 2. MAAŞ EKRANI -->
        <div id="screen-salary" class="screen hidden">
            <div class="header-action">
                <p class="info-text">Tahmini ve yatan maaşları buradan yönet.</p>
                <button class="btn-toggle" onclick="toggleVisibility('salary')">👁️ Rakamları Gizle/Göster</button>
            </div>
            <div class="card">
                <ul id="salary-list" class="list-group">
                    <!-- Javascript ile aylar buraya eklenecek -->
                </ul>
            </div>
        </div>

        <!-- 3. GENEL DURUM EKRANI -->
        <div id="screen-status" class="screen hidden">
            <div class="header-action">
                <p class="info-text">Banka, nakit ve genel hesap durumların.</p>
                <button class="btn-toggle" id="btn-status-toggle" onclick="toggleVisibility('status')">👁️ Rakamları Göster</button>
            </div>
            <div class="card form-card">
                <input type="text" id="acc-name" class="input-field" placeholder="Hesap/Banka Adı (Örn: Ziraat, Nakit)">
                <input type="number" id="acc-balance" class="input-field" placeholder="Bakiye (TL)" inputmode="decimal">
                <button class="btn-primary" onclick="addAccount()">Hesap Ekle / Güncelle</button>
            </div>
            <div class="card">
                <h3 class="card-title">Toplam Varlık: <span class="blur-status blur-active" id="total-status-balance">0 TL</span></h3>
                <ul id="account-list" class="list-group"></ul>
            </div>
        </div>

        <!-- 4. YATIRIM VE BİRİKİM EKRANI -->
        <div id="screen-investment" class="screen hidden">
             <div class="card form-card">
                <input type="text" id="inv-name" class="input-field" placeholder="Yatırım Cinsi (Örn: Gram Altın)">
                <input type="number" id="inv-amount" class="input-field" placeholder="Miktar / Adet" inputmode="decimal">
                <input type="number" id="inv-value" class="input-field" placeholder="Toplam Değer (TL)" inputmode="decimal">
                <button class="btn-primary" onclick="addInvestment()">Yatırım Ekle / Güncelle</button>
            </div>
            <div class="card">
                <ul id="investment-list" class="list-group"></ul>
            </div>
        </div>

    </main>

    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
